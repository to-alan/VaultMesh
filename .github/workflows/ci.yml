name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vaultmesh_test
          POSTGRES_USER: vaultmesh
          POSTGRES_PASSWORD: vaultmesh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vaultmesh -d vaultmesh_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      VAULTMESH_TEST_DATABASE_URL: postgres://vaultmesh:vaultmesh_test@127.0.0.1:5432/vaultmesh_test?sslmode=disable
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26.5"
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/vaultmesh-server ./cmd/vaultmesh-agent

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build
