name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  go:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17-alpine
        env:
          POSTGRES_DB: vaultmesh_test
          POSTGRES_USER: vaultmesh
          POSTGRES_PASSWORD: vaultmesh_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U vaultmesh -d vaultmesh_test"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 20
    env:
      VAULTMESH_TEST_DATABASE_URL: postgres://vaultmesh:vaultmesh_test@127.0.0.1:5432/vaultmesh_test?sslmode=disable
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v6
        with:
          go-version: "1.26.5"
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/vaultmesh-server ./cmd/vaultmesh-agent

  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v7
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci --no-audit --no-fund
      - run: npm run build

  containers:
    runs-on: ubuntu-latest
    env:
      POSTGRES_PASSWORD: vaultmesh_ci_postgres
      VAULTMESH_ADMIN_TOKEN: vaultmesh-ci-administrator-token
      VAULTMESH_MASTER_KEY: AAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAAA=
      VAULTMESH_ALLOWED_ORIGINS: http://127.0.0.1:3000
      VAULTMESH_PUBLIC_API_URL: http://127.0.0.1:8080
    steps:
      - uses: actions/checkout@v7
      - run: docker compose config --quiet
      - run: docker build --tag vaultmesh-control:ci .
      - run: docker build --file Dockerfile.web --tag vaultmesh-web:ci .
      - name: Smoke test independent containers
        run: |
          cleanup() {
            docker rm --force vaultmesh-control-ci vaultmesh-web-ci >/dev/null 2>&1 || true
          }
          trap cleanup EXIT
          docker run --detach --name vaultmesh-control-ci --publish 127.0.0.1:18081:8080 \
            --env VAULTMESH_ADMIN_TOKEN --env VAULTMESH_MASTER_KEY --env VAULTMESH_ALLOWED_ORIGINS \
            vaultmesh-control:ci
          docker run --detach --name vaultmesh-web-ci --publish 127.0.0.1:18080:80 \
            --env VAULTMESH_API_BASE_URL=https://api.example.test vaultmesh-web:ci
          curl --fail --silent --retry 20 --retry-all-errors --retry-delay 1 http://127.0.0.1:18081/healthz
          web_config=$(curl --fail --silent --retry 20 --retry-all-errors --retry-delay 1 http://127.0.0.1:18080/config.js) || {
            docker logs vaultmesh-web-ci
            exit 1
          }
          printf '%s\n' "$web_config"
          printf '%s\n' "$web_config" | grep --fixed-strings 'https://api.example.test'
          test "$(curl --silent --output /dev/null --write-out '%{http_code}' http://127.0.0.1:18081/)" = "404"
