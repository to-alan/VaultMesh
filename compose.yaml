services:
  postgres:
    image: postgres:17-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: vaultmesh
      POSTGRES_USER: vaultmesh
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
    volumes:
      - vaultmesh-postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vaultmesh -d vaultmesh"]
      interval: 5s
      timeout: 3s
      retries: 20

  control:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      VAULTMESH_LISTEN: :8080
      VAULTMESH_DATABASE_URL: postgres://vaultmesh:${POSTGRES_PASSWORD}@postgres:5432/vaultmesh?sslmode=disable
      VAULTMESH_ADMIN_TOKEN: ${VAULTMESH_ADMIN_TOKEN:?set VAULTMESH_ADMIN_TOKEN in .env}
      VAULTMESH_MASTER_KEY: ${VAULTMESH_MASTER_KEY:?set VAULTMESH_MASTER_KEY in .env}
      VAULTMESH_ALLOWED_ORIGINS: ${VAULTMESH_ALLOWED_ORIGINS:-http://127.0.0.1:3000}
      VAULTMESH_AUTO_MIGRATE: "true"
    ports:
      - "127.0.0.1:${VAULTMESH_API_PORT:-8080}:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile.web
    restart: unless-stopped
    environment:
      VAULTMESH_API_BASE_URL: ${VAULTMESH_PUBLIC_API_URL:-http://127.0.0.1:8080}
    ports:
      - "127.0.0.1:${VAULTMESH_WEB_PORT:-3000}:80"

volumes:
  vaultmesh-postgres:
